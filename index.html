<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vercel App</title>
    <link rel="Stylesheet" href="./styles.css"> 
    <script src="index.js"></script>
</head>
<body>
    <section id="landing">
        <nav>
            <div class="container">
                <div class="row nav__row">
                    <div class="nav__logo">
                        <img class="nav__logo--img" src="./assets/logo.2c.svg" alt="LOGO">
                        <div class="nav__logo--title">Treact</div>
                    </div>
                    <div class="nav__links">
                        <a href="#" class="nav__link">About</a>
                        <a href="#" class="nav__link">Blog</a>
                        <a href="#" class="nav__link">Pricing</a>
                        <a href="#" class="nav__link">Contact Us</a>
                        <a href="#" class="nav__link login">Login</a>
                        <a href="#" class="nav__link nav__link--primary">Sign Up</a>
                    </div>
                    <button class="btn__menu" onclick="openMenu()"></button>
                </div>
            </div>
        </nav>
        <div class="menu">
            <button class="btn__menu btn__menu--close" onclick="closeMenu()"></button>
            <div class="menu__links"></div>
        </div>
        <header>
            <div class="container">
                <div class="row">
                    <div class="header__description">
                        <h1>Beautiful React templates <span class="purple">for you</span></h1>
                        <p class="header__decription--para">Our template are easy to setup, understand and customize. Fully modular components with a variety of pages and components</p>
                        <div class="header__email">
                            <input type="email" class="header__email--input" placeholder="Your E-mail Address">
                            <button class="header__email--btn">Get Started</button>
                        </div>
                        <p class="header__customers--title">OUR TRUSTED CUSTOMERS</p>
                        <img src="./assets/customers-logo-strip.png" class="header__customers">
                    </div>
                    <figure class="header__img--wrapper">
                        <img src="./assets/design-illustration.svg" class="header__img">
                    </figure>
                </div>
            </div>
        </header>
    </section>
    <main>
        
    </main>
</body>
</html>
